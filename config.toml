urls = [
]


[folders]
download_dir = "./download" # where files will be downloaded to
media_dir = "u410:/mnt/data/media"       # where files will be written to after transcode
transcode_dir = "./transcode" # where temp transcode files will be

[pipeline]
transcode = true  # whether to transcode the downloaded files
delete_downloads = true #whether to delete full downloads
max_non_transcoded = 5 # max full-quality downloads waiting for transcode/move at once

[download_settings]
format =  "bv*+ba[language=en]/bv*+ba/best"
subtitleslangs = ["en.*"]
writesubtitles = true
quiet = true
noprogress = false
check_formats = true
ignoreerrors= "only_download"
#ratelimit = 1_000_000

[transcode_settings]
encoder = "none" # one of qsv, vaapi, none
quality = 20
device = "/dev/dri/renderD128"
crop = true # whether to remove padding

[ntfy]
url_base = "https://ntfy.akhlus.uk/"
topic = "iplayerDL"

[title_overrides]
